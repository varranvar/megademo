<div class="summary-cards-container">
    <div class="summary-card card-total">
        <div class="card-value">{{ stats.total }}</div>
        <div class="card-label">Total Packages</div>
    </div>
    <div class="summary-card card-critical">
        <div class="card-value">{{ stats.critical }}</div>
        <div class="card-label">Critical</div>
    </div>
    <div class="summary-card card-warning">
        <div class="card-value">{{ stats.warning }}</div>
        <div class="card-label">Warning</div>
    </div>
    <div class="summary-card card-fair">
        <div class="card-value">{{ stats.fair }}</div>
        <div class="card-label">Fair</div>
    </div>
    <div class="summary-card card-healthy">
        <div class="card-value">{{ stats.healthy }}</div>
        <div class="card-label">Healthy</div>
    </div>
</div>
