{% extends "layout.html" %}
{% from "partials/score_badge.html" import score_badge %}

{% block content %}
<div class="dashboard">
    <div class="page-header">
        <h1>Package Hygiene Dashboard</h1>
        <p>Real-time health monitoring for Ubuntu packages</p>
    </div>

    <div id="summary-cards" class="summary-cards" hx-get="/api/v1/stats/summary" hx-trigger="every 30s">
        {% include "partials/summary_cards.html" %}
    </div>

    <div class="controls-bar">
        <div class="controls-left">
            <input
                type="text"
                class="search-input"
                placeholder="Search packages..."
                name="search"
                hx-get="/api/v1/packages/table"
                hx-trigger="keyup changed delay:300ms"
                hx-target="#package-table"
                hx-include="[name='filter'],[name='sort']"
            >
            <select name="filter" class="filter-select"
                hx-get="/api/v1/packages/table"
                hx-trigger="change"
                hx-target="#package-table"
                hx-include="[name='search'],[name='sort']">
                <option value="all">All Grades</option>
                <option value="critical">Critical</option>
                <option value="warning">Warning</option>
                <option value="fair">Fair</option>
                <option value="healthy">Healthy</option>
            </select>
            <select name="sort" class="sort-select"
                hx-get="/api/v1/packages/table"
                hx-trigger="change"
                hx-target="#package-table"
                hx-include="[name='search'],[name='filter']">
                <option value="score">Score</option>
                <option value="name">Name</option>
                <option value="cves">CVEs</option>
                <option value="bugs">Bugs</option>
            </select>
        </div>
    </div>

    <div id="package-table" hx-get="/api/v1/packages/table" hx-trigger="load">
        <div class="table-loading">Loading packages...</div>
    </div>
</div>
{% endblock %}
